<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sympler — Boas-vindas</title>
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="../../css/main.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/desktop-sympler.css" />
  <style>
    body {
      background: linear-gradient(135deg, #0097ff 0%, #007acc 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .welcome-wrap {
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .welcome-avatar-anim {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 4px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      margin: 0 auto 24px;
      animation: bounceIn 0.6s ease;
    }

    @keyframes bounceIn {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }

    .welcome-title {
      color: white;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .welcome-sub {
      color: rgba(255,255,255,0.85);
      font-size: 16px;
      margin-bottom: 32px;
    }

    .welcome-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 36px;
      margin-bottom: 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.15);
    }

    .welcome-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    .welcome-stat-value {
      font-size: 26px;
      font-weight: 700;
      color: var(--color-primary);
      line-height: 1;
    }

    .welcome-stat-label {
      font-size: 12px;
      color: var(--color-text-light);
      margin-top: 6px;
    }

    .welcome-msg {
      background: var(--color-primary-light);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: left;
      margin-bottom: 24px;
    }

    .welcome-msg p { font-size: 14px; line-height: 1.6; margin: 0 0 6px; }

    .welcome-msg .from { font-size: 12px; color: var(--color-primary); font-weight: 700; margin: 0; }

    .welcome-tips { display: flex; flex-direction: column; gap: 10px; text-align: left; }

    .tip-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      color: var(--color-text);
    }

    .tip-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--color-primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .btn-enter {
      display: block;
      text-align: center;
      padding: 16px 32px;
      font-size: 16px;
      border-radius: var(--radius-md);
      animation: fadeUp 0.5s 0.3s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="welcome-wrap">
    <div class="welcome-avatar-anim">👩</div>
    <h1 class="welcome-title">Olá, Ana Lima! 🎉</h1>
    <p class="welcome-sub">Seja bem-vinda de volta ao Sympler</p>

    <div class="welcome-card">
      <div class="welcome-stats">
        <div>
          <div class="welcome-stat-value">1.250</div>
          <div class="welcome-stat-label">🪙 Sympla Coins</div>
        </div>
        <div>
          <div class="welcome-stat-value">6</div>
          <div class="welcome-stat-label">Formas de ganhar</div>
        </div>
        <div>
          <div class="welcome-stat-value">5</div>
          <div class="welcome-stat-label">Resgates feitos</div>
        </div>
      </div>
<div class="welcome-tips">
        <a class="tip-item" href="como-ganhar.html" style="display:flex;align-items:center;gap:12px;font-size:14px;color:var(--color-text);text-decoration:none;">
          <span class="tip-icon">🪙</span>
          <span>Descubra como ganhar Sympla Coins</span>
        </a>
        <a class="tip-item" href="marketplace.html" style="display:flex;align-items:center;gap:12px;font-size:14px;color:var(--color-text);text-decoration:none;">
          <span class="tip-icon">🛒</span>
          <span>Explore o marketplace e resgate seus Sympla Coins</span>
        </a>
        <a class="tip-item" href="marketplace.html" style="display:flex;align-items:center;gap:12px;font-size:14px;color:var(--color-text);text-decoration:none;">
          <span class="tip-icon">🎁</span>
          <span>Veja os brindes disponíveis no marketplace</span>
        </a>
      </div>
    </div>

    <a href="dashboard.html" class="btn btn-primary btn-enter">Explorar a plataforma →</a>
  </div>
</body>
</html>
