<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sympler — Sketch V1</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Open Sans', system-ui, -apple-system, sans-serif;
    }

    body {
      background: #0097ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* Background decorative circles */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      right: -120px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.07);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -80px;
      left: -80px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 48px 40px 40px;
      text-align: center;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo-wrap img {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
    }

    h1 {
      color: #ffffff;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.82);
      font-size: 15px;
      font-weight: 400;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #ffffff;
      color: #0097ff;
      border: none;
      border-radius: 12px;
      padding: 15px 24px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.12);
    }

    .btn:hover {
      background: #f0f8ff;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    .btn .icon {
      font-size: 18px;
    }

    .footer-note {
      color: rgba(255, 255, 255, 0.55);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    @media (max-width: 480px) {
      .card {
        margin: 16px;
        padding: 36px 24px 32px;
      }

      h1 { font-size: 22px; }
      .subtitle { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="assets/logo.svg" alt="Sympler Logo" />
    </div>

    <h1>Sympler — Sketch V1</h1>
    <p class="subtitle">Selecione a visão para navegar</p>

    <div class="btn-group">
      <a class="btn" href="pages/colaborador/login.html">
        <span class="icon">👤</span>
        Sympler
      </a>
      <a class="btn" href="pages/admin/admin-participantes.html">
        <span class="icon">⚙️</span>
        Sympler Admin
      </a>
    </div>

    <p class="footer-note">Protótipo navegável — dados fictícios</p>
  </div>
</body>
</html>
